# Hugging Face download map for the S1 GGUF artifacts.
#
# The downloader writes each file to the destination path expected by
# s1/manifest.yaml. Repo/file names can vary by uploader; always run the
# downloader with --dry-run on the Pi before the real download.

groups:
  - model_id: qwen3-0.6b
    model: Qwen3-0.6B
    repo: bartowski/Qwen_Qwen3-0.6B-GGUF
    source_file_template: Qwen_Qwen3-0.6B-{quant}.gguf
    dest_template: models/llama/tierA/qwen3-0.6B/qwen3-0.6b-{quant_lower}.gguf
    quants: [Q8_0, Q6_K, Q5_K_M, Q4_K_M, Q3_K_M, Q2_K, Q4_0]

  - model_id: qwen3-1.7b
    model: Qwen3-1.7B
    repo: bartowski/Qwen_Qwen3-1.7B-GGUF
    source_file_template: Qwen_Qwen3-1.7B-{quant}.gguf
    dest_template: models/llama/tierA/qwen3-1.7B/qwen3-1.7b-{quant_lower}.gguf
    quants: [Q8_0, Q6_K, Q5_K_M, Q4_K_M, Q3_K_M, Q2_K, Q4_0]

  - model_id: qwen3-4b
    model: Qwen3-4B
